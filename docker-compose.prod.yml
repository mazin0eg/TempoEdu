services:
  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"quit(db.adminCommand('ping').ok ? 0 : 2)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    mem_limit: 512m
    cpus: 0.50
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mongo-backup:
    build:
      context: ./ops/mongo-backup
      dockerfile: Dockerfile
    restart: always
    environment:
      MONGO_URI: mongodb://mongo:27017/skillswap
      BACKUP_DIR: /backups
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      TZ: ${TZ:-UTC}
    volumes:
      - mongobackups:/backups
    depends_on:
      mongo:
        condition: service_healthy
    mem_limit: 128m
    cpus: 0.25
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./TempoEdu-backend
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: 3000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/skillswap
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      INITIAL_CREDITS: 5
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=net.connect(3000,'127.0.0.1',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000);"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 25s
    mem_limit: 512m
    cpus: 1.00
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./TempoEdu-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: ''
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof nginx > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    mem_limit: 192m
    cpus: 0.50
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongodata:
  mongobackups:
