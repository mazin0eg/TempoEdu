services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/skillswap
      - JWT_SECRET=changeme-use-a-strong-secret
      - JWT_EXPIRES_IN=7d
      - INITIAL_CREDITS=5
      - CORS_ORIGIN=*

  frontend:
    build: ../TempoEdu-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodata:
