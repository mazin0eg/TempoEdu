<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2f8ff"/>
      <stop offset="100%" stop-color="#dfefff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <style>
      .title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #123b72; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #2a5b96; }
      .h { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f3f7c; }
      .t { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #355f91; }
      .chip { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #0f4fa8; }
    </style>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="60" y="70" class="title">TempoEdu System Architecture</text>
  <text x="60" y="102" class="subtitle">Frontend + API + Real-time + Data + Deployment</text>

  <rect x="60" y="150" rx="20" ry="20" width="320" height="420" fill="url(#card)" stroke="#7fb3ea" stroke-width="2"/>
  <text x="90" y="195" class="h">Frontend (React + Vite)</text>
  <text x="90" y="230" class="t">- Skills UI</text>
  <text x="90" y="260" class="t">- Sessions + Video UI</text>
  <text x="90" y="290" class="t">- Chat + Notifications UI</text>
  <text x="90" y="320" class="t">- Profile + Certificates</text>
  <rect x="90" y="360" rx="12" ry="12" width="160" height="36" fill="#e7f3ff"/>
  <text x="110" y="383" class="chip">REST API</text>
  <rect x="90" y="410" rx="12" ry="12" width="160" height="36" fill="#e7f3ff"/>
  <text x="110" y="433" class="chip">Socket.IO</text>

  <rect x="440" y="150" rx="20" ry="20" width="320" height="420" fill="url(#card)" stroke="#7fb3ea" stroke-width="2"/>
  <text x="470" y="195" class="h">Backend (NestJS)</text>
  <text x="470" y="230" class="t">- Auth / Users / Skills</text>
  <text x="470" y="260" class="t">- Sessions / Reviews / Credits</text>
  <text x="470" y="290" class="t">- Chat / Notifications / WebRTC</text>
  <text x="470" y="320" class="t">- Admin analytics</text>
  <rect x="470" y="360" rx="12" ry="12" width="190" height="36" fill="#e7f3ff"/>
  <text x="492" y="383" class="chip">JWT + Guards</text>
  <rect x="470" y="410" rx="12" ry="12" width="190" height="36" fill="#e7f3ff"/>
  <text x="492" y="433" class="chip">WebSocket Gateway</text>

  <rect x="820" y="150" rx="20" ry="20" width="320" height="200" fill="url(#card)" stroke="#7fb3ea" stroke-width="2"/>
  <text x="850" y="195" class="h">Database</text>
  <text x="850" y="230" class="t">MongoDB + Mongoose schemas</text>
  <text x="850" y="260" class="t">Users, Skills, Sessions, Reviews,</text>
  <text x="850" y="288" class="t">Messages, Notifications, Credits</text>

  <rect x="820" y="370" rx="20" ry="20" width="320" height="200" fill="url(#card)" stroke="#7fb3ea" stroke-width="2"/>
  <text x="850" y="415" class="h">Deployment</text>
  <text x="850" y="450" class="t">Docker Compose</text>
  <text x="850" y="480" class="t">- backend</text>
  <text x="850" y="508" class="t">- frontend (nginx)</text>
  <text x="850" y="536" class="t">- mongo</text>

  <line x1="380" y1="300" x2="440" y2="300" stroke="#2d8cff" stroke-width="4"/>
  <polygon points="440,300 424,292 424,308" fill="#2d8cff"/>

  <line x1="760" y1="250" x2="820" y2="250" stroke="#2d8cff" stroke-width="4"/>
  <polygon points="820,250 804,242 804,258" fill="#2d8cff"/>

  <line x1="760" y1="470" x2="820" y2="470" stroke="#2d8cff" stroke-width="4"/>
  <polygon points="820,470 804,462 804,478" fill="#2d8cff"/>
</svg>
